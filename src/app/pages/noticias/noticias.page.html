<ion-header>
  <ion-toolbar color="tertiary">
    <ion-buttons slot="start"><ion-back-button defaultHref="/home"></ion-back-button></ion-buttons>
    <ion-title>Últimas Notícias</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card *ngFor="let noticia of noticias" class="ion-margin-bottom">
    <img src="https://via.placeholder.com/400x150/e0e0e0/666666?text=Notícia+Saúde" alt="Capa Notícia" />
    <ion-card-header>
      <ion-card-subtitle>{{ noticia.data }}</ion-card-subtitle>
      <ion-card-title>{{ noticia.titulo }}</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      {{ noticia.resumo }}
      <ion-button fill="clear" size="small" color="tertiary">Ler mais</ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
