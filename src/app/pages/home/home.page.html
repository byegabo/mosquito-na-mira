<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Mosquito na Mira</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding bg-light">
  <div class="dashboard-container">
    <h3 class="titulo-sessao">Painel Epidemiológico</h3>
    
    <ion-grid fixed>
      <ion-row>
        <ion-col size="6">
          <ion-card class="card-estatistica total-focos">
            <ion-card-content>
              <ion-icon name="alert-circle" size="large"></ion-icon>
              <h2>{{ totalDenuncias }}</h2>
              <p>Focos Denunciados</p>
            </ion-card-content>
          </ion-card>
        </ion-col>

        <ion-col size="6">
          <ion-card class="card-estatistica zonas-alerta">
            <ion-card-content>
              <ion-icon name="map" size="large"></ion-icon>
              <h2>{{ zonasRisco }}</h2>
              <p>Zonas de Alerta</p>
            </ion-card-content>
          </ion-card>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>

  <div class="menu-container ion-padding-top">
    <h3 class="titulo-sessao">Ações e Serviços</h3>

    <ion-grid fixed class="ion-no-padding">
      <ion-row>
        
        <ion-col size="6" class="ion-padding-bottom ion-padding-end">
          <ion-button expand="block" color="danger" class="botao-menu" routerLink="/denunciar">
            <ion-icon name="megaphone" slot="top"></ion-icon>
            Nova Denúncia
          </ion-button>
        </ion-col>

        <ion-col size="6" class="ion-padding-bottom ion-padding-start">
          <ion-button expand="block" color="warning" class="botao-menu" routerLink="/consultar-denuncia">
            <ion-icon name="search" slot="top"></ion-icon>
            Consultar
          </ion-button>
        </ion-col>

        <ion-col size="6" class="ion-padding-bottom ion-padding-end">
          <ion-button expand="block" color="primary" class="botao-menu" routerLink="/mapa">
            <ion-icon name="map" slot="top"></ion-icon>
            Mapa de Focos
          </ion-button>
        </ion-col>

        <ion-col size="6" class="ion-padding-bottom ion-padding-start">
          <ion-button expand="block" color="success" class="botao-menu" routerLink="/chatbot">
            <ion-icon name="hardware-chip" slot="top"></ion-icon>
            Triagem (IA)
          </ion-button>
        </ion-col>

        <ion-col size="6" class="ion-padding-bottom ion-padding-end">
          <ion-button expand="block" color="secondary" class="botao-menu" routerLink="/noticias">
            <ion-icon name="newspaper" slot="top"></ion-icon>
            Notícias
          </ion-button>
        </ion-col>

        <ion-col size="6" class="ion-padding-bottom ion-padding-start">
          <ion-button expand="block" color="tertiary" class="botao-menu" routerLink="/postos-saude">
            <ion-icon name="medical" slot="top"></ion-icon>
            Postos de Saúde
          </ion-button>
        </ion-col>

        <ion-col size="12" class="ion-padding-bottom">
          <ion-button expand="block" color="medium" class="botao-menu" routerLink="/suporte">
            <ion-icon name="help-circle" slot="start"></ion-icon>
            Suporte / Ajuda
          </ion-button>
        </ion-col>

      </ion-row>
    </ion-grid>
  </div>
</ion-content>
